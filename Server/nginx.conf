events {}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    server_names_hash_bucket_size 64;

    server_tokens off;
    server {

        listen 8057 default_server;
        listen 8053 default_server;
        listen 8063 default_server;
        listen 8066 default_server;

        server_name _;

    # Drop the connection silently (no response)
        return 444;
    }

    # -------------------------
    # Server listening on port 8057 (for load balancer)
    # HTTP only - load balancer handles SSL
    # -------------------------
    server {

        client_max_body_size 20M;
        listen 8057;  # Remove 'ssl' here
        server_name is-assessment.titancustomers.com www.is-assessment.titancustomers.com;

        # NO SSL certificates needed here - load balancer handles it
        if ($host !~* ^(is-assessment\.titancustomers\.com)$) {
            return 444;
        }

        # React build folder
        root C:/Users/Administrator/Projects/is-assessment/client/dist;
        index index.html;

            add_header X-Frame-Options "SAMEORIGIN" always;

        add_header X-Content-Type-Options "nosniff" always;

        add_header X-XSS-Protection "1; mode=block" always;

        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            proxy_hide_header Server;
        add_header Permissions-Policy "accelerometer=(), camera=(), microphone=(), geolocation=(), gyroscope=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        location /assets/ {
            autoindex off;
        }


        # Serve React routes
        location / {
            try_files $uri /index.html;
        }

        # API proxy
        location /api/v1.0/ {
            proxy_pass http://127.0.0.1:8060/;
            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection keep-alive;
            proxy_set_header Host $proxy_host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        access_log C:/Users/Administrator/nginx/logs/access.log;
        error_log  C:/Users/Administrator/nginx/logs/error.log debug;
    }

    server {
    listen 8054;

    # Only allow TLS 1.2 and 1.3
    ssl_protocols TLSv1.2 TLSv1.3;

    # ONLY AEAD ciphers - NO CBC suites
    ssl_ciphers 'TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';

    ssl_prefer_server_ciphers on;

    # Disable weak protocols explicitly
    ssl_session_tickets off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;

    location / {
        proxy_pass http://127.0.0.1:5000;
    }
}

