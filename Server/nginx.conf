    #------------------------------------------
        #SBOM APP
#------------------------------------------
server {
    listen 8066;
    server_name sbom-qualys.titancustomers.com www.sbom-qualys.titancustomers.com;

    # React build folder
    root "C:/Users/Administrator/Projects/Vapt/frontend/dist";
    index index.html;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # API proxy - Forward /sbom_qualys/api/* to backend
    location /sbom_qualys/api/ {
        proxy_pass http://10.160.14.76:8064/api/;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # Serve React routes - must come after API proxy
    location / {
        try_files $uri /index.html;
    }

    access_log C:/Users/Administrator/nginx/logs/sbom_access.log;
    error_log  C:/Users/Administrator/nginx/logs/sbom_error.log debug;
}
server {
    listen 8051;
    server_name dlp.titancustomers.com;

    client_max_body_size 800M;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    location / {
        proxy_pass http://127.0.0.1:8051/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;

        proxy_hide_header Server;             # Hide Tornadoâ€™s header
        add_header Server "nginx" always;     # Replace with NGINX (or blank if you prefer)
    }

    # Optional: block host spoofing
    if ($host !~* ^(dlp\.titancustomers\.com)$) {
        return 444;
    }
}

}