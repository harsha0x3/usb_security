events {}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    server_names_hash_bucket_size 64;

    server_tokens off;
    map $request_method $not_allowed_method {
        default  0;
        TRACE    1;
        TRACK    1;
        DELETE   1;
        OPTIONS  1;
        CONNECT  1;
    }
    
    server {

        listen 8057 default_server;
        listen 8053 default_server;
        listen 8063 default_server;
        listen 8066 default_server;

        server_name _;

    # Drop the connection silently (no response)
        return 444;
    }

    # -------------------------
    # Server listening on port 8057 (for load balancer)
    # HTTP only - load balancer handles SSL
    # -------------------------
    server {

        client_max_body_size 20M;
        listen 8057;  # Remove 'ssl' here
        server_name is-assessment.titancustomers.com www.is-assessment.titancustomers.com;

        # NO SSL certificates needed here - load balancer handles it
        if ($host !~* ^(is-assessment\.titancustomers\.com)$) {
            return 444;
        }

        # React build folder
        root C:/Users/Administrator/Projects/is-assessment/client/dist;
        index index.html;

            add_header X-Frame-Options "SAMEORIGIN" always;

        add_header X-Content-Type-Options "nosniff" always;

        add_header X-XSS-Protection "1; mode=block" always;

        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            proxy_hide_header Server;
        add_header Permissions-Policy "accelerometer=(), camera=(), microphone=(), geolocation=(), gyroscope=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        location /assets/ {
            autoindex off;
        }


        # Serve React routes
        location / {
            try_files $uri /index.html;
        }

        # API proxy
        location /api/v1.0/ {
            proxy_pass http://127.0.0.1:8060/;
            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection keep-alive;
            proxy_set_header Host $proxy_host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        access_log C:/Users/Administrator/nginx/logs/access.log;
        error_log  C:/Users/Administrator/nginx/logs/error.log debug;
    }

    server {
        listen 8054;
        server_name usbapp.titan.in;

        # Block host spoofing
        if ($host !~* ^(usbapp\.titan\.in)$) {
            return 444;
        }

        # Block unsafe HTTP methods
        if ($not_allowed_method) {
            return 405;
        }

        # Limit request size
        client_max_body_size 1M;

        # Security headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;

        # Hide server info
        proxy_hide_header Server;
        proxy_hide_header X-Powered-By;

        # Only allow GET and POST to Flask
        location / {
            if ($request_method !~ ^(GET|POST)$) {
                return 405;
            }

            proxy_pass http://127.0.0.1:8054;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

            # Remove origin/referer headers (browser request blocking)
            proxy_set_header Origin "";
            proxy_set_header Referer "";

            proxy_connect_timeout 30s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        access_log C:/Users/Administrator/nginx/logs/usb_access.log;
        error_log  C:/Users/Administrator/nginx/logs/usb_error.log warn;
    }

